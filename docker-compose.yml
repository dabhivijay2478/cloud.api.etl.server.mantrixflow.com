# ETL Service - Local Docker run
# Usage: docker compose up -d   (from apps/etl)
# Health: http://localhost:8001/health
#
# Callback URL: When API runs on host, set INTERNAL_API_URL in API .env to
#   http://host.docker.internal:5000 (Mac/Win) or http://172.17.0.1:5000 (Linux)

services:
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8080"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8080"
      ETL_AUTH_TOKEN: ${ETL_AUTH_TOKEN:-test-token}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Required when ETL runs in Docker: URL the container can reach to callback the API
      ETL_CALLBACK_BASE_URL: ${ETL_CALLBACK_BASE_URL:-http://host.docker.internal:5000}
      ETL_TEST_CONNECTION_TIMEOUT_SEC: ${ETL_TEST_CONNECTION_TIMEOUT_SEC:-60}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
