# Meltano Project: Bidirectional ETL (Postgres ↔ MySQL ↔ MongoDB)
# https://docs.meltano.com/concepts/project
#
# DYNAMIC MODE (recommended): Use ETL API POST /run-meltano-pipeline
#   Supports all 9 directions including same-type: postgres/mysql/mongodb → postgres/mysql/mongodb
#
# STATIC MODE (CLI): Set POSTGRES_URL, MYSQL_URL, MONGODB_URI, MONGODB_DATABASE in .env
#   Run: meltano install && meltano run <job-name>

project_id: ai-bi-etl
default_environment: dev

environments:
  - name: dev

plugins:
  extractors:
    - name: tap-postgres
      variant: meltanolabs
      config:
        sqlalchemy_url: ${POSTGRES_URL}
        default_replication_method: INCREMENTAL
        filter_schemas: ["public"]
      select:
        - "*.*"

    - name: tap-mysql
      variant: meltanolabs
      config:
        sqlalchemy_url: ${MYSQL_URL}
        default_replication_method: INCREMENTAL
        filter_schemas: []
      select:
        - "*.*"

    - name: tap-mongodb
      variant: meltanolabs
      config:
        mongodb_connection_string: ${MONGODB_URI}
        database: ${MONGODB_DATABASE}
        flattening_enabled: true
        flattening_max_depth: 5
        default_replication_method: INCREMENTAL
      metadata:
        "*":
          replication-method: INCREMENTAL
          # tap-mongodb yields "replication_key" (not _id) in output records
          replication-key: replication_key

  loaders:
    - name: target-postgres
      variant: meltanolabs
      config:
        sqlalchemy_url: ${POSTGRES_URL}
        load_method: upsert
        add_record_metadata: true
        flattening_enabled: true
        flattening_max_depth: 5

    - name: target-mysql
      variant: thkwag
      config:
        sqlalchemy_url: ${MYSQL_URL}
        flattening_enabled: true
        flattening_max_depth: 5

    - name: target-mongodb
      variant: hotgluexyz
      config:
        connection_string: ${MONGODB_URI}
        db_name: ${MONGODB_DATABASE}
        flattening_enabled: true
        flattening_max_depth: 5

  utilities:
    - name: dbt-postgres
      variant: dbt-labs
      config:
        project_dir: transform
        profiles_dir: transform/profiles/postgres
        host: ${POSTGRES_HOST:-localhost}
        port: ${POSTGRES_PORT:-5432}
        user: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        dbname: ${POSTGRES_DBNAME:-postgres}
        schema: public

jobs:
  # Bidirectional ETL: all tap+target combinations
  - name: mongodb-to-postgres
    tasks:
      - tap-mongodb target-postgres

  - name: postgres-to-postgres
    tasks:
      - tap-postgres target-postgres

  - name: mysql-to-postgres
    tasks:
      - tap-mysql target-postgres

  - name: postgres-to-mysql
    tasks:
      - tap-postgres target-mysql

  - name: postgres-to-mongodb
    tasks:
      - tap-postgres target-mongodb

  - name: mysql-to-mongodb
    tasks:
      - tap-mysql target-mongodb

  - name: mongodb-to-mysql
    tasks:
      - tap-mongodb target-mysql

  - name: mysql-to-mysql
    tasks:
      - tap-mysql target-mysql

  - name: mongodb-to-mongodb
    tasks:
      - tap-mongodb target-mongodb

schedules:
  - name: mongodb-to-postgres-hourly
    job: mongodb-to-postgres
    interval: "@hourly"
    start_date: 2025-01-01 00:00:00
